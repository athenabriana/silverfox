# flavours configuration — managed by silverfox.
# Edit here to add/remove apps. Apply with: flavours apply <scheme>
# List schemes: flavours list
# Update templates/schemes: flavours update all
#
# COSMIC theming uses `cosmic-settings appearance import` after flavours
# generates the RON file. The fox home-theme/home-sync recipes call import
# automatically. The wallpaper is set separately via the CosmicBackground
# config file.

[[item]]
template = "ghostty"
file = "~/.config/ghostty/config-base16"
rewrite = true

[[item]]
template = "zed"
file = "~/.config/zed/themes/base16-dark.json"
rewrite = true

# COSMIC theme: written to a cache file, then imported via cosmic-settings.
# Fox home-theme/home-sync run the import after flavours apply.
[[item]]
template = "cosmic-theme"
file = "~/.cache/silverfox/cosmic-theme.ron"
rewrite = true

# COSMIC wallpaper (solid color from base00).
[[item]]
template = "cosmic-wallpaper-all"
file = "~/.config/cosmic/com.system76.CosmicBackground/v1/all"
rewrite = true

[[item]]
template = "cosmic-wallpaper-colors"
file = "~/.config/cosmic/com.system76.CosmicSettings.Wallpaper/v1/custom-colors"
rewrite = true

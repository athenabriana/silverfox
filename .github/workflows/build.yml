name: build-sideral

on:
  push:
    branches: [main]
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch: {}
  pull_request:
    branches: [main]

env:
  IMAGE_DESC: "Personal Fedora atomic desktop — stock GNOME on ublue-os/silverblue-main, ghostty terminal (Terra), Zen Browser (Flatpak from Flathub), curated flatpaks, GNU-stow-seeded user dotfiles, sideral-cli-tools meta-RPM (zsh, starship, carapace-bin, mise, code, atuin, fzf, bat, eza, ripgrep, zoxide, gh, git-lfs, gcc/make/cmake, stow), and rootless podman with docker compatibility shims."
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  R2_ENDPOINT: https://e30740452050b87fd107356bd87f01eb.r2.cloudflarestorage.com
  R2_BUCKET: sideral
  R2_PUBLIC_BASE: https://sideral.athenabriana.com
  ISO_KEY: sideral_x86_64.iso

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fox-preflight:
    # Lints the bash dispatcher / libexec scripts and runs the bash
    # integration suites before the heavy image-build matrix kicks off.
    # Bash + shellcheck + util-linux (script(1) for PTY tests) only —
    # no language toolchain bootstrap. Fails fast (<2min) when a fox
    # script regresses, saving ~12min × 2 variants of image build time.
    name: fox lint + integration tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just + shellcheck + util-linux
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              just shellcheck util-linux

      - name: just fox-lint
        run: just fox-lint

      - name: just fox-test
        run: just fox-test

  build:
    name: Build container image (${{ matrix.variant }})
    needs: fox-preflight
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    # Matrix builds two image variants from the same Containerfile:
    #   • base   — stock open-source GPU stack (amdgpu/i915/xe/nouveau)
    #   • nvidia — proprietary NVIDIA drivers, derived from
    #     silverblue-nvidia which bakes signed kmods. The ISO chooser
    #     (iso/anaconda-hook.sh) reads `lspci` at install time and pulls
    #     whichever variant matches the user's hardware.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            base_image: ghcr.io/ublue-os/silverblue-main:44
            image_name: sideral
          - variant: nvidia
            base_image: ghcr.io/ublue-os/silverblue-nvidia:44
            image_name: sideral-nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximise disk
        uses: ublue-os/remove-unwanted-software@v9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}},enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            io.artifacthub.package.logo-url=https://avatars.githubusercontent.com/u/${{ github.repository_owner_id }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./os
          file: ./os/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}@${DIGEST}"

  release:
    name: Build ISO & publish release
    runs-on: ubuntu-24.04
    needs: build
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      packages: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install semantic-release
        run: npm ci || npm install --no-audit --no-fund

      - name: Dry-run semantic-release
        id: dryrun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT=$(npx semantic-release --dry-run 2>&1) || true
          echo "$OUT"
          NEXT=$(printf '%s\n' "$OUT" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [[ -n "$NEXT" ]]; then
            echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Next release: v${NEXT}"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No release-worthy commits since last tag — skipping ISO build."
          fi

      - name: Resolve image tag
        id: tags
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_ref=ghcr.io/${OWNER}/sideral:latest" >> "$GITHUB_OUTPUT"
          echo "iso_name=sideral-v${{ steps.dryrun.outputs.next_version }}-x86_64.iso" >> "$GITHUB_OUTPUT"

      - name: Maximise disk space
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/remove-unwanted-software@v9

      - name: Log in to ghcr.io
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build live ISO with titanoboa
        id: build-iso
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/titanoboa@840217d97bd0bc9a52466508c54d8dda5c5ba2fd
        with:
          image-ref: ${{ steps.tags.outputs.image_ref }}
          iso-dest: ${{ runner.temp }}/${{ steps.tags.outputs.iso_name }}
          compression: squashfs
          hook-post-rootfs: ${{ github.workspace }}/iso/anaconda-hook.sh
          livesys: false

      - name: Stage ISO under output/
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          mkdir -p "${{ github.workspace }}/output"
          mv "${{ steps.build-iso.outputs.iso-dest }}" "${{ github.workspace }}/output/${{ env.ISO_KEY }}"

      - name: Checksum ISO
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cd ./output
          sha256sum "${{ env.ISO_KEY }}" > "${{ env.ISO_KEY }}.sha256"
          ls -lh

      - name: Upload ISO + checksum to R2
        if: steps.dryrun.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          cd ./output
          aws s3 cp "${{ env.ISO_KEY }}" "s3://${{ env.R2_BUCKET }}/${{ env.ISO_KEY }}" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --content-type application/x-iso9660-image \
            --no-progress
          aws s3 cp "${{ env.ISO_KEY }}.sha256" "s3://${{ env.R2_BUCKET }}/${{ env.ISO_KEY }}.sha256" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --content-type text/plain \
            --no-progress

      - name: semantic-release (real)
        if: steps.dryrun.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Append download link to release notes
        if: steps.dryrun.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="v${{ steps.dryrun.outputs.next_version }}"
          ISO_KEY_ENC="$(jq -rn --arg s "${{ env.ISO_KEY }}" '$s|@uri')"
          ISO_URL="${{ env.R2_PUBLIC_BASE }}/${ISO_KEY_ENC}"
          SUM_URL="${{ env.R2_PUBLIC_BASE }}/${ISO_KEY_ENC}.sha256"
          gh release view "${VERSION}" --repo "${{ github.repository }}" --json body -q .body > /tmp/notes.md
          {
            echo
            echo "## Download"
            echo
            echo "- ISO: <${ISO_URL}>"
            echo "- SHA256: <${SUM_URL}>"
            echo
            echo '```bash'
            echo "curl -L -o '${{ env.ISO_KEY }}' ${ISO_URL}"
            echo "curl -L -o '${{ env.ISO_KEY }}.sha256' ${SUM_URL}"
            echo "sha256sum -c '${{ env.ISO_KEY }}.sha256'"
            echo "sudo dd if='${{ env.ISO_KEY }}' of=/dev/sdX bs=4M status=progress oflag=sync"
            echo '```'
          } >> /tmp/notes.md
          gh release edit "${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/notes.md
